<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kids Learning Hub</title>
<style>
body{font-family:Arial;margin:0;background:#f4f8ff}header{background:#4f7cff;color:#fff;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px #0002;cursor:pointer}
footer{padding:20px;text-align:center}
button{padding:10px 18px}
</style></head>
<body>
<header><h1>🎓 Kids Learning Hub</h1><p>Prototype for GitHub Pages</p></header>
<div class="grid">
<div class="card" onclick="play();alert('Math game coming soon!')">🧮 Math World</div>
<div class="card" onclick="play();alert('English game coming soon!')">📚 English</div>
<div class="card" onclick="play();alert('Science game coming soon!')">🔬 Science</div>
<div class="card" onclick="play();alert('Geography game coming soon!')">🌍 Geography</div>
<div class="card" onclick="play();alert('Memory game coming soon!')">🧠 Memory</div>
<div class="card" onclick="play();alert('Coding game coming soon!')">💻 Coding</div>
</div>
<footer><button onclick="play()">🔊 Test Sound</button></footer>
<script>
let ctx;
function play(){
 if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
 const o=ctx.createOscillator(),g=ctx.createGain();
 o.connect(g);g.connect(ctx.destination);o.frequency.value=660;
 g.gain.value=.05;o.start();o.stop(ctx.currentTime+.15);
}
</script></body></html>
